pre-commit:
  commands:
    cargo-fix:
      glob: "*.rs"
      run: cargo fix --allow-dirty --allow-staged && git add -u
      stage_fixed: true
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
